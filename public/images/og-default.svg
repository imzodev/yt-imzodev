<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#10b981" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#10b981" opacity="0.08"/>
  
  <!-- Logo badge -->
  <rect x="500" y="180" width="200" height="80" rx="16" fill="url(#accentGradient)"/>
  <text x="600" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">IZ</text>
  
  <!-- Brand name -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">imzodev</text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">AI &amp; Software Development</text>
  
  <!-- URL -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">imzodev.com</text>
  
  <!-- Bottom accent line -->
  <rect x="200" y="560" width="800" height="4" rx="2" fill="url(#accentGradient)" opacity="0.5"/>
</svg>
